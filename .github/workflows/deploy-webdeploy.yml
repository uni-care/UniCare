name: Deploy to Production via WebDeploy
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Restore dependencies
        run: dotnet restore ./UniCare

      - name: Build
        run: dotnet build ./UniCare --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ./UniCare --configuration Release --output ./publish

      - name: Install Web Deploy
        shell: pwsh
        run: choco install webdeploy -y --no-progress

      - name: Deploy with WebDeploy (MSDeploy)
        shell: pwsh
        run: |
          $msdeploy = "C:\Program Files\IIS\Microsoft Web Deploy V3\msdeploy.exe"
          $site   = "${{ secrets.MONSTER_SITE_NAME }}"
          $url    = "${{ secrets.MONSTER_PUBLISH_URL }}"
          $user   = "${{ secrets.MONSTER_USERNAME }}"
          $pass   = "${{ secrets.MONSTER_PASSWORD }}"
          $source = "$env:GITHUB_WORKSPACE\publish"

          $psi = New-Object System.Diagnostics.ProcessStartInfo
          $psi.FileName = $msdeploy
          $psi.ArgumentList.Add("-verb:sync")
          $psi.ArgumentList.Add("-source:contentPath=$source")
          $psi.ArgumentList.Add("-dest:contentPath=$site,computerName=https://$url/msdeploy.axd?site=$site,userName=$user,password=$pass,authtype=Basic,includeAcls=False")
          $psi.ArgumentList.Add("-allowUntrusted")
          $psi.ArgumentList.Add("-disableLink:AppPoolExtension")
          $psi.ArgumentList.Add("-disableLink:ContentExtension")
          $psi.ArgumentList.Add("-disableLink:CertificateExtension")
          $psi.ArgumentList.Add("-verbose")
          $psi.UseShellExecute = $false

          $proc = [System.Diagnostics.Process]::Start($psi)
          $proc.WaitForExit()
          if ($proc.ExitCode -ne 0) {
            Write-Error "msdeploy failed with exit code $($proc.ExitCode)"
            exit $proc.ExitCode
          }
