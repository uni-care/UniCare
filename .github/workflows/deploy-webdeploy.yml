name: Deploy to Production via WebDeploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0' # Adjust based on your .NET version
      
      - name: Restore dependencies
        run: dotnet restore ./UniCare
      
      - name: Build
        run: dotnet build ./UniCare --configuration Release --no-restore
      
      - name: Publish
        run: dotnet publish ./UniCare --configuration Release --output ./publish
      
      - name: Deploy with WebDeploy
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'unicare'
          package: './publish'
          publish-profile: ${{ secrets.WEBDEPLOY_PROFILE }}
